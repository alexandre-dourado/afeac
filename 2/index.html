<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Filosofia e a Cidade - Câmera 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050507; 
            --text-main: #f5f5f7;
            --accent: #d4af37; 
            --glass-bg: rgba(15, 15, 18, 0.7);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #15151e 0%, #050507 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* --- NAVBAR ESTÉTICA --- */
        .navbar {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 8px 15px;
            display: flex;
            gap: 10px;
            z-index: 2000;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .nav-item {
            text-decoration: none; color: #999; font-weight: 400; font-size: 0.85rem;
            padding: 10px 20px; border-radius: 30px; transition: all 0.3s ease; cursor: pointer;
        }

        .nav-item:hover {
            color: #fff; background: rgba(255, 255, 255, 0.1); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        /* --- PAINEL DE INFORMAÇÕES LATERAL --- */
        .info-panel {
            position: fixed; left: 5%; top: 50%; transform: translateY(-50%) translateX(-40px);
            width: 320px; padding: 40px; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1); z-index: 1500;
        }

        body.is-focused .info-panel { opacity: 1; transform: translateY(-50%) translateX(0); }

        .info-tag { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; color: var(--accent); margin-bottom: 15px; display: block; font-weight: 600;}
        .info-title { font-family: 'Playfair Display', serif; margin: 0 0 20px 0; font-size: 2.2rem; font-weight: 600; line-height: 1.1; }
        .info-desc { font-size: 0.95rem; line-height: 1.6; color: #a1a1a6; font-weight: 300; }

        /* --- SISTEMA DE CÂMERA 3D --- */
        .viewport {
            perspective: 1500px; /* Define a profundidade do cenário 3D */
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scene {
            position: relative;
            width: 800px; 
            height: 800px;
            transform-style: preserve-3d;
            /* As variáveis de controle da câmera (atualizadas via JS) */
            --cam-rot-x: 0deg;
            --cam-rot-y: 0deg;
            --cam-zoom: 1;
            --cam-pan-x: 0px;
            --cam-pan-y: 0px;
            
            /* Transição super cinematográfica (bezier curve) para o zoom/pan */
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.3, 1);
            transform: 
                translate3d(var(--cam-pan-x), var(--cam-pan-y), 0)
                scale(var(--cam-zoom))
                rotateX(var(--cam-rot-x)) 
                rotateY(var(--cam-rot-y));
        }

        /* Os Elementos / Assets */
        .layer {
            position: absolute;
            transition: filter 0.8s ease, opacity 0.8s ease;
            will-change: transform; 
        }

        /* --- MÁGICA DE ILUMINAÇÃO (Sem mexer no Z-index) --- */
        /* Quando Focado: Escurece tudo que não for o destaque */
        body.is-focused .layer:not(.highlighted) {
            filter: brightness(0.15) grayscale(80%) blur(1px);
            opacity: 0.8;
        }

        /* O Destaque: Brilha, mas PERMANECE na sua camada natural (atrás da montanha se preciso for) */
        .highlighted {
            filter: drop-shadow(0 0 40px rgba(212, 175, 55, 0.9)) brightness(1.3) !important;
            /* Z-INDEX REMOVIDO! A montanha continuará cobrindo o sol. */
        }

        /* Idle Animations */
        @keyframes pulseSun { 0%, 100% { filter: brightness(1) drop-shadow(0 0 15px rgba(255, 200, 0, 0.3)); } 50% { filter: brightness(1.1) drop-shadow(0 0 35px rgba(255, 215, 0, 0.7)); } }
        #proj-podcast { animation: pulseSun 5s infinite; }

        /* ====================================================================
           Z-INDEX RIGOROSO (A REGRA DE OCLUSÃO)
           ==================================================================== */
        #fundo { width: 100%; top: 0; left: 0; z-index: 1; }
        
        #proj-podcast { width: 20%; top: 35%; left: 40%; z-index: 2; } /* SOL ATRÁS DO MONTE */
        #proj-pesquisa { width: 80%; top: 10%; left: 10%; z-index: 2; opacity: 0.8; } /* NUVENS */
        #proj-cultura { width: 20%; top: 42%; left: 15%; z-index: 3; } /* IGREJINHA ATRÁS DO MONTE/CASAS */
        
        .montanhas { width: 95%; top: 40%; left: 2.5%; z-index: 4; } /* O MONTE VERDE COBRE O SOL E IGREJA */
        .morro { width: 100%; top: 50%; left: 0; z-index: 5; }
        .chao { width: 100%; top: 65%; left: 0; z-index: 6; }
        
        .arvores { width: 25%; top: 42%; left: 75%; z-index: 7; }
        .casas-esq { width: 25%; top: 52%; left: 5%; z-index: 7; }
        .casas-dir { width: 25%; top: 48%; left: 70%; z-index: 7; }
        
        #proj-vivencia { width: 50%; top: 53%; left: 25%; z-index: 8; } /* PRÉDIO */
        
        .multidao-esq { width: 35%; top: 65%; left: 0; z-index: 10; }
        .multidao-dir { width: 35%; top: 65%; left: 65%; z-index: 10; }
        .pessoas-fundo { width: 70%; top: 68%; left: 15%; z-index: 10; }
        
        #proj-metodo { width: 12%; top: 70%; left: 28%; z-index: 15; } /* ÍNDIA */
        #proj-acervo { width: 20%; top: 85%; left: 40%; z-index: 16; } /* FITAS */
        #proj-audiovisual { width: 30%; top: 75%; left: -5%; z-index: 17; } /* PÁSSARO */
        #proj-olimpiada { width: 35%; top: 70%; right: -5%; z-index: 18; } /* FLOR */

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-item" data-target="proj-podcast" data-zoom="1.4" data-px="150px" data-py="100px" data-title="Podcast Filosófico" data-tag="Áudio" data-desc="Debates contemporâneos e provocações filosóficas em formato acessível.">Podcast</div>
        <div class="nav-item" data-target="proj-pesquisa" data-zoom="1.2" data-px="150px" data-py="180px" data-title="Núcleo de Investigação" data-tag="Pesquisa" data-desc="Grupos de estudo voltados para iniciação científica.">Pesquisa</div>
        <div class="nav-item" data-target="proj-cultura" data-zoom="1.5" data-px="250px" data-py="50px" data-title="Saberes Regionais" data-tag="Cultura" data-desc="Exploração da Etnomatemática no Norte de Minas.">Saberes</div>
        <div class="nav-item" data-target="proj-vivencia" data-zoom="1.4" data-px="150px" data-py="-30px" data-title="Intervalo Filosofia" data-tag="Vivência" data-desc="Intervenções curtas e dinâmicas no campus durante os intervalos.">Intervalo</div>
        <div class="nav-item" data-target="proj-metodo" data-zoom="1.5" data-px="150px" data-py="-150px" data-title="Logos: Atelier" data-tag="Metodologia" data-desc="Um laboratório de construção de teses e debates.">Atelier</div>
        <div class="nav-item" data-target="proj-acervo" data-zoom="1.6" data-px="100px" data-py="-250px" data-title="Publicações" data-tag="Acervo" data-desc="Coletânea de ensaios e produções textuais desenvolvidas.">Publicações</div>
        <div class="nav-item" data-target="proj-audiovisual" data-zoom="1.5" data-px="250px" data-py="-180px" data-title="Cineclube" data-tag="Audiovisual" data-desc="Exibições mensais seguidas de debates críticos.">Cineclube</div>
        <div class="nav-item" data-target="proj-olimpiada" data-zoom="1.5" data-px="-50px" data-py="-180px" data-title="Olimpíada de Filosofia" data-tag="Evento" data-desc="A 1ª Olimpíada de Filosofia da Unimontes.">Olimpíada</div>
    </nav>

    <div class="info-panel" id="info-panel">
        <span class="info-tag" id="panel-tag">Tag</span>
        <h2 class="info-title" id="panel-title">Título do Projeto</h2>
        <p class="info-desc" id="panel-desc">Descrição elegante.</p>
    </div>

    <div class="viewport">
        <main class="scene" id="scene">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/Circulo_fundo_azul.png" class="layer" id="fundo" data-z="0">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/sol.png" class="layer" id="proj-podcast" data-z="10">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/nuvens.png" class="layer" id="proj-pesquisa" data-z="20">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/monte_verde.png" class="layer montanhas" data-z="30">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/Elemento_morro_terra.png" class="layer morro" data-z="30">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/Chao_fundo_marrom_terra.png" class="layer chao" data-z="30">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/arvores_na_direita.png" class="layer arvores" data-z="40">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/casinhas_esquerda.png" class="layer casas-esq" data-z="40">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/casinhas_direita.png" class="layer casas-dir" data-z="40">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/igrejinha.png" class="layer" id="proj-cultura" data-z="45">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/predio.png" class="layer" id="proj-vivencia" data-z="50">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/Grupo_de_pessoas_ao_fundo_na_esquerda.png" class="layer multidao-esq" data-z="60">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/Grupo_de_pessoa_ao_fundo_na_direita.png" class="layer multidao-dir" data-z="60">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/familia_trabalhadores_rurais_na_esquerda.png" class="layer pessoas-fundo" style="left: 10%;" data-z="65">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/rapaz_camiseta_verde.png" class="layer pessoas-fundo" style="left: 45%; top: 62%;" data-z="70">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/silhueta_roxa.png" class="layer pessoas-fundo" style="left: 60%;" data-z="70">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/India.png" class="layer" id="proj-metodo" data-z="80">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/fitas_festa.png" class="layer" id="proj-acervo" data-z="90">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/passaro.png" class="layer" id="proj-audiovisual" data-z="100">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/recortadas/Planta-flor-frente.png" class="layer" id="proj-olimpiada" data-z="110">

        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navItems = document.querySelectorAll('.nav-item');
            const scene = document.getElementById('scene');
            const layers = document.querySelectorAll('.layer');
            
            // Textos do Painel
            const pTag = document.getElementById('panel-tag');
            const pTitle = document.getElementById('panel-title');
            const pDesc = document.getElementById('panel-desc');

            // Mapeamento Paralax Profundidade 3D
            // Transforma os elementos em camadas 3D reais no carregamento
            layers.forEach(layer => {
                const zOffset = layer.getAttribute('data-z') || 0;
                layer.style.transform = `translateZ(${zOffset}px)`;
            });

            // Lógica do MouseMove (Parallax Idle Suave)
            window.addEventListener('mousemove', (e) => {
                // Se a câmera estiver travada focando em um projeto, não movemos o mouse
                if(document.body.classList.contains('is-focused')) return;

                // Calcula a rotação 3D sutil baseada no cursor
                const x = (window.innerWidth / 2 - e.pageX) / 40; 
                const y = (window.innerHeight / 2 - e.pageY) / 40;

                scene.style.setProperty('--cam-rot-y', `${-x}deg`);
                scene.style.setProperty('--cam-rot-x', `${y}deg`);
            });

            // Lógica de Foco (Zoom Cinematográfico)
            navItems.forEach(item => {
                item.addEventListener('mouseenter', () => {
                    const targetId = item.getAttribute('data-target');
                    const targetEl = document.getElementById(targetId);
                    
                    if (targetEl) {
                        targetEl.classList.add('highlighted');
                        document.body.classList.add('is-focused');
                        
                        // Atualiza o painel de texto
                        pTag.textContent = item.getAttribute('data-tag');
                        pTitle.textContent = item.getAttribute('data-title');
                        pDesc.textContent = item.getAttribute('data-desc');

                        // MÁGICA DA CÂMERA: Puxa as coordenadas HTML do data-zoom, data-px e data-py
                        const zoom = item.getAttribute('data-zoom');
                        const panX = item.getAttribute('data-px');
                        const panY = item.getAttribute('data-py');

                        // Executa a transição da cena alterando as variáveis CSS
                        scene.style.setProperty('--cam-zoom', zoom);
                        scene.style.setProperty('--cam-pan-x', panX);
                        scene.style.setProperty('--cam-pan-y', panY);
                        
                        // Reseta a rotação do mouse para focar reto no asset
                        scene.style.setProperty('--cam-rot-x', '0deg');
                        scene.style.setProperty('--cam-rot-y', '0deg');
                    }
                });

                item.addEventListener('mouseleave', () => {
                    const targetId = item.getAttribute('data-target');
                    const targetEl = document.getElementById(targetId);
                    
                    if (targetEl) targetEl.classList.remove('highlighted');
                    document.body.classList.remove('is-focused');

                    // Retorna a câmera para o estado plano e inicial (zoom 1, pan 0)
                    scene.style.setProperty('--cam-zoom', '1');
                    scene.style.setProperty('--cam-pan-x', '0px');
                    scene.style.setProperty('--cam-pan-y', '0px');
                });
            });
        });
    </script>
</body>
</html>
