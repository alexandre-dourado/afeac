<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Filosofia e a Cidade - Unimontes</title>
    <style>
        :root {
            --bg-color: #f8f9fa; /* Fundo claro e limpo */
            --text-dark: #1d1d1f;
            --accent: #5e5ce6;
            --nav-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-dark);
        }

        /* --- NAVBAR ESTÉTICA --- */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 10px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            display: flex;
            gap: 25px;
            z-index: 1000;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .nav-item {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
            cursor: default; /* Pode mudar para pointer se virarem links no futuro */
        }

        .nav-item:hover {
            color: var(--accent);
            background: rgba(94, 92, 230, 0.1);
        }

        /* --- CONTAINER DA ARTE --- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-top: 80px; /* Espaço para a navbar */
        }

        .logo-container {
            position: relative;
            width: 850px;
            max-width: 95vw;
            aspect-ratio: 1 / 1;
            transition: filter 0.6s ease;
        }

        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* A arte não é mais clicável/interativa diretamente */
            transition: transform 0.6s cubic-bezier(0.2, 0, 0.2, 1), filter 0.4s ease;
        }

        /* --- ANIMAÇÕES DE REPOUSO (VIVA, MAS SUTIL) --- */
        @keyframes pulseSun {
            0%, 100% { filter: brightness(1) drop-shadow(0 0 10px rgba(255, 215, 0, 0.3)); }
            50% { filter: brightness(1.1) drop-shadow(0 0 25px rgba(255, 215, 0, 0.6)); }
        }

        @keyframes swayElement {
            0%, 100% { transform: rotate(-1.5deg); }
            50% { transform: rotate(1.5deg); }
        }

        @keyframes floatGentle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }

        .anim-sun { animation: pulseSun 5s infinite; }
        .anim-sway { animation: swayElement 8s ease-in-out infinite; transform-origin: center bottom; }
        .anim-float { animation: floatGentle 6s ease-in-out infinite; }
        .anim-float-delay { animation: floatGentle 7s ease-in-out infinite 2s; }

        /* --- DESTAQUE VIA NAVBAR (HIGHLIGHT) --- */
        
        /* Classe injetada via JS quando o mouse passa no menu */
        .highlighted {
            filter: drop-shadow(0 0 25px rgba(94, 92, 230, 0.8)) brightness(1.15) !important;
            transform: scale(1.03) !important;
            z-index: 100;
            animation: none !important; /* Pausa o repouso para dar 100% de foco */
        }

        /* Quando ALGUM elemento está destacado, escurecemos levemente a arte para dar contraste */
        .logo-container.has-highlight .layer:not(.highlighted) {
            filter: brightness(0.8) grayscale(20%);
        }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-item" data-target="proj-podcast">Podcast</a>
        <a href="#" class="nav-item" data-target="proj-pesquisa">Pesquisa</a>
        <a href="#" class="nav-item" data-target="proj-cultura">Saberes</a>
        <a href="#" class="nav-item" data-target="proj-vivencia">Intervalo</a>
        <a href="#" class="nav-item" data-target="proj-metodo">Atelier</a>
        <a href="#" class="nav-item" data-target="proj-acervo">Publicações</a>
        <a href="#" class="nav-item" data-target="proj-audiovisual">Cineclube</a>
        <a href="#" class="nav-item" data-target="proj-olimpiada">Olimpíada</a>
    </nav>

    <main class="main-content">
        <div class="logo-container" id="logo-wrapper">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Circulo_fundo_azul.png" class="layer">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/nuvens.png" class="layer anim-float" id="proj-pesquisa">
                 
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/sol.png" class="layer anim-sun" id="proj-podcast">
                 
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/monte_verde.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Elemento_morro_terra.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Chao_fundo_marrom_terra.png" class="layer">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/arvores_na_direita.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/casinhas_esquerda.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/casinhas_direita.png" class="layer">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/igrejinha.png" class="layer anim-float" id="proj-cultura">

            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/predio.png" class="layer anim-float-delay" id="proj-vivencia">

            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Grupo_de_pessoas_ao_fundo_na_esquerda.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Grupo_de_pessoa_ao_fundo_na_direita.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/familia_trabalhadores_rurais_na_esquerda.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/homem_terno_1.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/homem_terno_2.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/menina_com_fita_na_cabeca_de_frente.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/mulher_cabelo_curto.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/mulher_negra_perfil.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/rapaz_camiseta_azul.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/rapaz_camiseta_verde.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/silhueta_roxa.png" class="layer">
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Sombra_mulher_direita_com_chapeu_e_binoculo.png" class="layer">
            
            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/India.png" class="layer anim-float" id="proj-metodo">

            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/fitas_festa.png" class="layer anim-float-delay" id="proj-acervo">

            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/passaro.png" class="layer anim-float" id="proj-audiovisual">

            <img src="https://raw.githubusercontent.com/alexandre-dourado/afeac/refs/heads/main/img/Planta-flor-frente.png" class="layer anim-sway" id="proj-olimpiada" style="transform-origin: 82% 80%;">

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navItems = document.querySelectorAll('.nav-item');
            const wrapper = document.getElementById('logo-wrapper');

            navItems.forEach(item => {
                // Quando o mouse ENTRA na opção da navbar
                item.addEventListener('mouseenter', () => {
                    const targetId = item.getAttribute('data-target');
                    const targetElement = document.getElementById(targetId);
                    
                    if (targetElement) {
                        targetElement.classList.add('highlighted');
                        wrapper.classList.add('has-highlight');
                    }
                });

                // Quando o mouse SAI da opção da navbar
                item.addEventListener('mouseleave', () => {
                    const targetId = item.getAttribute('data-target');
                    const targetElement = document.getElementById(targetId);
                    
                    if (targetElement) {
                        targetElement.classList.remove('highlighted');
                        wrapper.classList.remove('has-highlight');
                    }
                });
            });
        });
    </script>
</body>
</html>
