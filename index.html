<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Filosofia e a Cidade - Unimontes</title>
    <style>
        :root {
            --bg-color: #0f0f11; /* Dark mode premium */
            --text-main: #f5f5f7;
            --accent: #5e5ce6;
            --glass-bg: rgba(25, 25, 28, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container Principal da Logo */
        .logo-container {
            position: relative;
            width: 800px;
            max-width: 90vw;
            aspect-ratio: 1 / 1; /* Mantém a proporção quadrada do canvas original */
            margin-right: 300px; /* Espaço para o painel de info */
            transition: all 0.5s ease;
        }

        /* Todas as imagens assumem o tamanho total do container e se sobrepõem */
        .layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none; /* Elementos base não recebem clique */
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s ease;
        }

        /* Classe para os elementos interativos */
        .interactive {
            pointer-events: auto; /* Apenas estes recebem interação do mouse */
            cursor: pointer;
            z-index: 50; /* Garante que fiquem clicáveis acima da base */
        }

        /* --- EFEITOS DE HOVER ESPECÍFICOS --- */
        .hover-scale:hover {
            transform: scale(1.04);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
        }

        .hover-float:hover {
            transform: translateY(-10px);
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4));
        }

        .hover-shadow:hover {
            transform: scale(1.02);
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* --- EFEITO DE CLIQUE (GLOW) --- */
        .active-glow {
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)) brightness(1.1) !important;
            transform: scale(1.05) !important;
            z-index: 100;
        }

        /* Outros elementos ficam mais escuros quando um está ativo */
        .logo-container.has-active .interactive:not(.active-glow) {
            filter: brightness(0.6) grayscale(30%);
        }

        /* --- PAINEL DE INFORMAÇÕES (Tech-Minimal) --- */
        .info-panel {
            position: absolute;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            width: 320px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .info-panel.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(-50%) translateX(0);
        }

        .info-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
            font-weight: 600;
        }

        .info-title {
            margin: 0 0 15px 0;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .info-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #a1a1a6;
            margin-bottom: 25px;
        }

        .btn-saiba-mais {
            display: inline-block;
            padding: 10px 20px;
            background-color: var(--text-main);
            color: var(--bg-color);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-saiba-mais:hover {
            transform: scale(1.05);
            background-color: var(--accent);
            color: white;
        }

        /* Responsividade básica */
        @media (max-width: 1024px) {
            .logo-container { margin-right: 0; margin-bottom: 250px; }
            .info-panel {
                top: auto;
                bottom: 5%;
                right: 50%;
                transform: translateX(50%);
                width: 85vw;
                max-width: 400px;
            }
            .info-panel.visible { transform: translateX(50%) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logo-wrapper">
        <!-- BASE (Não interativos - Z-index automático pelo DOM) -->
        <img src="http://alexandre-dourado.github.io/afeac/img/Circulo_fundo_azul.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/Fundo_marrom.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/Chao_fundo_marrom_terra.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/Elemento_morro_terra.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/monte_verde.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/arvores_na_direita.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/casinhas_esquerda.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/casinhas_direita.png" class="layer">
        
        <!-- ELEMENTOS DE COMPOSIÇÃO (Pessoas e sombras) -->
        <img src="http://alexandre-dourado.github.io/afeac/img/Grupo_de_pessoas_ao_fundo_na_esquerda.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/Grupo_de_pessoa_ao_fundo_na_direita.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/familia_trabalhadores_rurais_na_esquerda.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/homem_terno_1.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/homem_terno_2.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/menina_com_fita_na_cabeca_de_frente.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/mulher_cabelo_curto.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/mulher_negra_perfil.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/rapaz_camiseta_azul.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/rapaz_camiseta_verde.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/silhueta_roxa.png" class="layer">
        <img src="http://alexandre-dourado.github.io/afeac/img/Sombra_mulher_direita_com_chapeu_e_binoculo.png" class="layer">

        <!-- ELEMENTOS INTERATIVOS (Os 8 projetos) -->
        
        <!-- 1. Sol -> Podcast -->
        <img src="http://alexandre-dourado.github.io/afeac/img/sol.png" class="layer interactive hover-scale" 
             data-tag="Áudio" data-title="Podcast Filosófico" 
             data-desc="Debates contemporâneos e provocações filosóficas em formato acessível para você ouvir onde estiver.">

        <!-- 2. Nuvens -> Pesquisa -->
        <img src="http://alexandre-dourado.github.io/afeac/img/nuvens.png" class="layer interactive hover-float" 
             data-tag="Pesquisa" data-title="Núcleo de Investigação" 
             data-desc="Grupos de estudo voltados para a iniciação científica e produção de artigos dentro da academia.">

        <!-- 3. Prédio -> Intervalo Filosofia -->
        <img src="http://alexandre-dourado.github.io/afeac/img/predio.png" class="layer interactive hover-shadow" 
             data-tag="Vivência" data-title="Intervalo Filosofia" 
             data-desc="Intervenções curtas e dinâmicas no campus durante os intervalos. A filosofia descendo as escadas da universidade.">

        <!-- 4. Igrejinha -> Etnomatemática / Saberes -->
        <img src="http://alexandre-dourado.github.io/afeac/img/igrejinha.png" class="layer interactive hover-scale" 
             data-tag="Cultura" data-title="Saberes Regionais" 
             data-desc="Exploração da Etnomatemática e saberes tradicionais do Norte de Minas integrados ao pensamento acadêmico.">

        <!-- 5. Índia -> Logos / Atelier -->
        <img src="http://alexandre-dourado.github.io/afeac/img/India.png" class="layer interactive hover-scale" 
             data-tag="Metodologia" data-title="Logos: Atelier Filosófico" 
             data-desc="Um laboratório de construção de teses e debates estruturados para alunos e pesquisadores.">

        <!-- 6. Pássaro -> Cineclube -->
        <img src="http://alexandre-dourado.github.io/afeac/img/passaro.png" class="layer interactive hover-float" 
             data-tag="Audiovisual" data-title="Cineclube de Filosofia" 
             data-desc="Exibições mensais seguidas de debates críticos sobre estética, ética e sociedade através da sétima arte.">

        <!-- 7. Flor -> Olimpíada -->
        <img src="http://alexandre-dourado.github.io/afeac/img/Planta-flor-frente.png" class="layer interactive hover-scale" 
             data-tag="Evento" data-title="Olimpíada de Filosofia" 
             data-desc="A 1ª Olimpíada de Filosofia da Unimontes. Despertando o pensamento crítico nas escolas da região.">

        <!-- 8. Fitas / Estandarte -> Publicações -->
        <img src="http://alexandre-dourado.github.io/afeac/img/fitas_festa.png" class="layer interactive hover-float" 
             data-tag="Acervo" data-title="Revista & Publicações" 
             data-desc="Coletânea de ensaios, resumos e produções textuais desenvolvidas pelos projetos de extensão.">

    </div>

    <!-- Interface do Card Dinâmico -->
    <div class="info-panel" id="info-card">
        <span class="info-tag" id="card-tag">Tag</span>
        <h2 class="info-title" id="card-title">Título do Projeto</h2>
        <p class="info-desc" id="card-desc">Descrição curta e direta sobre o impacto do projeto na comunidade acadêmica e externa.</p>
        <a href="#" class="btn-saiba-mais" id="card-btn">Saiba mais</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const interactives = document.querySelectorAll('.interactive');
            const wrapper = document.getElementById('logo-wrapper');
            const infoCard = document.getElementById('info-card');
            
            // Elementos do Card
            const cardTag = document.getElementById('card-tag');
            const cardTitle = document.getElementById('card-title');
            const cardDesc = document.getElementById('card-desc');

            let currentActive = null;

            interactives.forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation(); // Evita fechar imediatamente ao clicar

                    // Se clicar no mesmo que já está ativo, desativa
                    if (currentActive === this) {
                        closeCard();
                        return;
                    }

                    // Remove ativo anterior
                    if (currentActive) {
                        currentActive.classList.remove('active-glow');
                    }

                    // Define o novo ativo
                    currentActive = this;
                    this.classList.add('active-glow');
                    wrapper.classList.add('has-active');

                    // Preenche os dados
                    cardTag.textContent = this.getAttribute('data-tag');
                    cardTitle.textContent = this.getAttribute('data-title');
                    cardDesc.textContent = this.getAttribute('data-desc');

                    // Mostra o card
                    infoCard.classList.add('visible');
                });
            });

            // Função para fechar/resetar
            function closeCard() {
                if (currentActive) {
                    currentActive.classList.remove('active-glow');
                    currentActive = null;
                }
                wrapper.classList.remove('has-active');
                infoCard.classList.remove('visible');
            }

            // Clicar fora da logo ou do card fecha a visualização
            document.body.addEventListener('click', (e) => {
                if (!e.target.classList.contains('interactive') && !infoCard.contains(e.target)) {
                    closeCard();
                }
            });
        });
    </script>
</body>
</html>
